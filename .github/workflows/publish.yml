name: publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./src/JustyBase.NetezzaDriver.slnx

      - name: Build
        run: dotnet build ./src/JustyBase.NetezzaDriver.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack ./src/JustyBase.NetezzaDriver\JustyBase.NetezzaDriver.csproj -c Release --no-build /p:GeneratePackageOnBuild=false

      - name: NuGet login
        uses: nuget/login@v1

      - name: Publish to NuGet
        run: dotnet nuget push "bin/Release/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate
